<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ontario Land Transfer Tax Calculator | Korman's</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:    #002856;
      --blue:    #0057BC;
      --blue-lt: #e8f0fb;
      --blue-md: #ccddf5;
      --red:     #b0001a;
      --red-lt:  #fce8eb;
      --gray:    #525252;
      --gray-lt: #f5f7fa;
      --border:  #dde3ec;
      --white:   #ffffff;
      --radius:  4px;
    }

    html, body {
      height: 100%;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      line-height: 1.5;
      color: var(--gray);
    }

    body {
      background: linear-gradient(160deg, #002856 0%, #0057BC 100%);
      display: flex;
      flex-direction: column;
      padding: 16px 14px;
    }

    /* ── Header ── */
    .header {
      text-align: center;
      color: white;
      margin-bottom: 10px;
      flex-shrink: 0;
    }
    .header h1 {
      font-size: 1.25rem;
      font-weight: 700;
      letter-spacing: -.2px;
    }
    .header p {
      font-size: .75rem;
      opacity: .75;
      margin-top: 2px;
    }

    /* ── Card — grows to fill remaining space ── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,.25);
    }

    /* ── Views ── */
    .view {
      display: none;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }
    .view.active { display: flex; }

    /* ── View header bar ── */
    .view-header {
      padding: 10px 18px 8px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .view-header .section-label {
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .9px;
      color: var(--blue);
    }

    /* ── View body — scrolls if needed ── */
    .view-body {
      flex: 1;
      overflow-y: auto;
      padding: 12px 18px;
    }

    /* ── View footer — always visible ── */
    .view-footer {
      padding: 10px 18px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    /* ── Form elements ── */
    .field { margin-bottom: 8px; }
    .field label {
      display: block;
      font-size: .76rem;
      font-weight: 500;
      color: var(--navy);
      margin-bottom: 4px;
    }
    .input-wrap { position: relative; }
    .input-wrap .prefix {
      position: absolute; left: 11px; top: 50%;
      transform: translateY(-50%);
      font-weight: 600; color: var(--navy); font-size: .88rem; pointer-events: none;
    }
    input[type="text"], input[type="number"] {
      width: 100%; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 8px 11px; font-family: 'Poppins', sans-serif;
      font-size: .86rem; color: var(--navy); background: var(--white);
      outline: none; transition: border-color .18s;
    }
    input[type="text"]:focus, input[type="number"]:focus {
      border-color: var(--blue); box-shadow: 0 0 0 3px rgba(0,87,188,.12);
    }
    .input-wrap input[type="number"] { padding-left: 26px; }
    input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type="number"] { -moz-appearance: textfield; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

    .prop-types {
      display: flex; gap: 0;
      background: #e8edf5; border-radius: 10px; padding: 4px;
    }
    .prop-type {
      flex: 1; border: 1.5px solid var(--border); border-radius: 8px;
      padding: 7px 6px; cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; transition: all .15s;
      min-height: 52px;
    }
    .prop-type input { display: none; }
    .prop-type .pt-label {
      font-size: .8rem; font-weight: 600; color: var(--gray);
      line-height: 1.2; display: block;
    }
    .prop-type .pt-sub {
      font-size: .62rem; font-style: italic; font-weight: 400;
      color: #8a96b8; display: block; line-height: 1.15; margin-top: 1px;
    }
    .prop-type:has(input:checked) {
      background: var(--white);
      box-shadow: 0 1px 6px rgba(0,40,86,.13);
    }
    .prop-type:has(input:checked) .pt-label { color: var(--blue); }
    .prop-type:has(input:checked) .pt-sub { color: var(--blue); opacity: .75; }

    .toggle-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 8px 13px; background: var(--gray-lt); border-radius: 8px;
      margin-bottom: 6px; cursor: pointer;
      border: 1.5px solid transparent; transition: border-color .15s, background .15s;
    }
    .toggle-row:hover { background: var(--blue-lt); border-color: var(--blue-md); }
    .toggle-row .tl { font-size: .78rem; font-weight: 500; color: var(--navy); user-select: none; }
    .toggle-row .tl small { display: block; font-weight: 400; font-size: .68rem; color: var(--gray); }

    .switch { position: relative; display: inline-block; width: 38px; height: 21px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider { position: absolute; inset: 0; background: #c8d0dd; border-radius: 21px; transition: background .2s; cursor: pointer; }
    .slider::before { content: ''; position: absolute; height: 15px; width: 15px; left: 3px; top: 3px; background: white; border-radius: 50%; transition: transform .2s; box-shadow: 0 1px 4px rgba(0,0,0,.2); }
    input:checked + .slider { background: var(--blue); }
    input:checked + .slider::before { transform: translateX(17px); }

    .error-msg {
      background: var(--red-lt); color: var(--red);
      border: 1px solid #f5c0c8; border-radius: 8px;
      padding: 5px 10px; font-size: .68rem; margin-bottom: 8px; display: none;
      white-space: normal; line-height: 1.3;
    }
    .error-msg.show { display: block; }

    /* ── Buttons ── */
    .btn-primary {
      width: 100%; background: var(--blue); color: white; border: none;
      border-radius: 8px; padding: 12px;
      font-family: 'Poppins', sans-serif; font-size: .9rem; font-weight: 600;
      cursor: pointer; box-shadow: 0 2px 8px rgba(0,87,188,.25);
      transition: background .15s;
      display: flex; align-items: center; justify-content: center;
      text-align: center; -webkit-appearance: none;
    }
    .btn-primary:hover { background: #004da8; }

    .btn-row { display: flex; gap: 8px; }
    .btn-secondary {
      flex: 1; background: var(--white); color: var(--blue);
      border: 1.5px solid var(--blue); border-radius: 50px; padding: 9px;
      font-family: 'Poppins', sans-serif; font-size: .8rem; font-weight: 600;
      cursor: pointer; text-align: center; transition: all .15s;
      display: flex; align-items: center; justify-content: center;
      -webkit-appearance: none;
    }
    .btn-secondary:hover { background: var(--blue-lt); }
    .btn-outline {
      background: var(--white); color: var(--gray);
      border: 1.5px solid var(--border); border-radius: 50px; padding: 7px 14px;
      font-family: 'Poppins', sans-serif; font-size: .8rem; font-weight: 500;
      cursor: pointer; transition: all .15s; white-space: nowrap;
      display: flex; align-items: center; justify-content: center;
      -webkit-appearance: none;
    }
    .btn-outline:hover { color: var(--navy); border-color: #aab4c8; }

    /* ── Results summary ── */
    .result-summary {
      background: linear-gradient(135deg, var(--navy) 0%, #003d7a 100%);
      border-radius: 10px; padding: 16px; color: white; margin-bottom: 14px;
    }
    .result-property { font-size: .7rem; opacity: .7; margin-bottom: 8px; letter-spacing: .2px; }
    .result-rows { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
    .result-row { display: flex; justify-content: space-between; align-items: center; }
    .result-row .rr-label { font-size: .78rem; opacity: .88; }
    .result-row .rr-amount { font-size: .83rem; font-weight: 600; }
    .result-row.rebate .rr-amount { color: #6ee8a8; }
    .result-divider { height: 1px; background: rgba(255,255,255,.15); margin: 4px 0; }
    .result-total { display: flex; justify-content: space-between; align-items: baseline; padding-top: 5px; }
    .result-total .rt-label { font-size: .83rem; font-weight: 500; opacity: .9; }
    .result-total .rt-amount { font-size: 1.5rem; font-weight: 700; letter-spacing: -.5px; }

    .details-link {
      display: flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px; border-radius: 8px;
      background: var(--gray-lt); border: 1px solid var(--border);
      font-size: .78rem; font-weight: 600; color: var(--navy);
      cursor: pointer; transition: all .15s; margin-bottom: 0;
      text-align: center;
    }
    .details-link:hover { background: var(--blue-lt); border-color: var(--blue-md); color: var(--blue); }

    .disclaimer {
      font-size: .64rem; color: #9aa4b8;
      text-align: center; line-height: 1.5; margin-top: 12px;
    }

    /* ── Breakdown (view 3) ── */
    .breakdown-section-title {
      font-size: .67rem; font-weight: 700; letter-spacing: .6px;
      text-transform: uppercase; color: var(--blue);
      padding: 9px 0 5px;
      border-bottom: 1.5px solid var(--blue-md);
      margin-bottom: 6px; margin-top: 14px;
    }
    .breakdown-section-title:first-child { margin-top: 0; }

    .breakdown-table { width: 100%; border-collapse: collapse; font-size: .74rem; margin-bottom: 4px; }
    .breakdown-table th {
      background: var(--gray-lt); color: var(--gray); font-weight: 600;
      font-size: .65rem; text-transform: uppercase; letter-spacing: .4px;
      padding: 5px 10px; text-align: left; border-bottom: 1px solid var(--border);
    }
    .breakdown-table th:last-child, .breakdown-table td:last-child { text-align: right; }
    .breakdown-table td { padding: 6px 10px; border-bottom: 1px solid var(--border); color: var(--navy); }
    .breakdown-table tr:last-child td { border-bottom: none; }
    .breakdown-table tr.tier-active { background: var(--blue-lt); }
    .breakdown-table tr.tier-active td { font-weight: 500; }
    .breakdown-table .subtotal td { font-weight: 600; background: var(--gray-lt); border-top: 1.5px solid var(--border); }
    .breakdown-table .rebate-row td { color: #1a7f4b; font-weight: 500; }
    .breakdown-table .grand-total td { background: var(--navy); color: white; font-weight: 700; }

    /* ── 18px font for form + results views ── */
    #view-form .field label,
    #view-form .toggle-row .tl,
    #view-form .error-msg,
    #view-form .location-badge { font-size: 14px; }

    #view-form input[type="text"],
    #view-form input[type="number"] { font-size: 16px; padding: 10px 12px; }
    #view-form .input-wrap input[type="number"] { padding-left: 28px; }
    #view-form .input-wrap .prefix { font-size: 16px; }

    #view-form .btn-primary,
    #view-results .btn-secondary,
    #view-results .btn-outline,
    #view-details .btn-secondary,
    #view-details .btn-outline { font-size: 15px; }

    #view-results .result-property { font-size: 13px; }
    #view-results .result-row .rr-label,
    #view-results .result-row .rr-amount { font-size: 15px; }
    #view-results .result-total .rt-label { font-size: 15px; }
    #view-results .result-total .rt-amount { font-size: 1.7rem; }
    #view-results .details-link { font-size: 15px; }
    #view-results .disclaimer { font-size: 12px; }

    .view-header .section-label { font-size: 11px; }

    /* ── Mobile table fix — no horizontal scroll ── */
    .breakdown-table { table-layout: fixed; width: 100%; }
    .breakdown-table th,
    .breakdown-table td { word-break: break-word; overflow-wrap: break-word; }
    .breakdown-table th:first-child,
    .breakdown-table td:first-child { width: 36%; }
    .breakdown-table th:nth-child(2),
    .breakdown-table td:nth-child(2) { width: 14%; }
    .breakdown-table th:nth-child(3),
    .breakdown-table td:nth-child(3) { width: 25%; }
    .breakdown-table th:last-child,
    .breakdown-table td:last-child { width: 25%; }
    #view-details .view-body { overflow-x: hidden; }

    /* Hide taxable column on mobile — prevents horizontal scroll on Safari */
    @media (max-width: 520px) {
      .breakdown-table th:nth-child(3),
      .breakdown-table td:nth-child(3) { display: none; }
      .breakdown-table th:first-child,
      .breakdown-table td:first-child { width: 48%; }
      .breakdown-table th:nth-child(2),
      .breakdown-table td:nth-child(2) { width: 18%; }
      .breakdown-table th:last-child,
      .breakdown-table td:last-child { width: 34%; }
      .breakdown-table { font-size: .68rem; }
    }

    @media (max-width: 400px) {
      .grid-2 { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="header">
    <h1>Ontario Land Transfer Tax Calculator</h1>
    <p>Accurate provincial &amp; Toronto municipal tax estimates</p>
  </div>

  <div class="card">

    <!-- ── VIEW 1: Form ── -->
    <div class="view active" id="view-form">
      <div class="view-header">
        <div class="section-label">Property Details</div>
      </div>
      <div class="view-body">
        <div class="error-msg" id="errorMsg"></div>

        <div class="field">
          <label for="price">Purchase Price</label>
          <div class="input-wrap">
            <span class="prefix">$</span>
            <input type="number" id="price" placeholder="500,000" min="1" step="1000">
          </div>
        </div>

        <div class="field">
          <label>Property Type</label>
          <div class="prop-types">
            <label class="prop-type">
              <input type="radio" name="propType" value="residential" checked>
              <span class="pt-label">Residential<em class="pt-sub">1-2 units</em></span>
            </label>
            <label class="prop-type">
              <input type="radio" name="propType" value="other">
              <span class="pt-label">Other<em class="pt-sub">3+ units</em><em class="pt-sub">Commercial</em></span>
            </label>
          </div>
        </div>

        <label class="toggle-row" for="torontoToggle">
          <div class="tl">Property is in Toronto <small>Applies Municipal Land Transfer Tax (MLTT)</small></div>
          <label class="switch"><input type="checkbox" id="torontoToggle"><span class="slider"></span></label>
        </label>

        <label class="toggle-row" for="fthbToggle">
          <div class="tl">First-Time Home Buyer <small>May qualify for provincial &amp; municipal rebates</small></div>
          <label class="switch"><input type="checkbox" id="fthbToggle"><span class="slider"></span></label>
        </label>
      </div>
      <div class="view-footer">
        <button type="button" class="btn-primary" onclick="calculate()">Calculate Land Transfer Tax</button>
      </div>
    </div>

    <!-- ── VIEW 2: Results ── -->
    <div class="view" id="view-results">
      <div class="view-header">
        <div class="section-label">Your Estimate</div>
      </div>
      <div class="view-body">
        <div class="result-summary">
          <div class="result-property" id="summaryProperty"></div>
          <div class="result-rows" id="summaryRows"></div>
          <div class="result-divider"></div>
          <div class="result-total">
            <span class="rt-label">Total Net LTT</span>
            <span class="rt-amount" id="summaryTotal"></span>
          </div>
        </div>

        <div class="details-link" onclick="showDetails()">
          View Full Calculation Breakdown
        </div>

        <p class="disclaimer">Estimates only. Always confirm with a qualified real estate lawyer before closing.</p>
      </div>
      <div class="view-footer">
        <div class="btn-row">
          <button type="button" class="btn-secondary" onclick="window.print()">Save as PDF</button>
          <button type="button" class="btn-outline" onclick="resetForm()">Recalculate</button>
        </div>
      </div>
    </div>

    <!-- ── VIEW 3: Breakdown ── -->
    <div class="view" id="view-details">
      <div class="view-header">
        <div class="section-label">Full Calculation Breakdown</div>
      </div>
      <div class="view-body" id="breakdownContent">
        <!-- populated by JS -->
      </div>
      <div class="view-footer">
        <div class="btn-row">
          <button type="button" class="btn-secondary" onclick="showView('view-results')">Back to Results</button>
          <button type="button" class="btn-outline" onclick="resetForm()">Recalculate</button>
        </div>
      </div>
    </div>

  </div><!-- /card -->

<script>
  const fmt = n => n.toLocaleString('en-CA', { style:'currency', currency:'CAD', minimumFractionDigits:2, maximumFractionDigits:2 });
  const pct = r => (r*100).toFixed(r<0.01?3:r<0.1?2:1)+'%';

  const PROVINCIAL_BRACKETS = [
    { min:0,       max:55000,    rate:0.005,  label:'First $55,000' },
    { min:55000,   max:250000,   rate:0.010,  label:'$55,000 – $250,000' },
    { min:250000,  max:400000,   rate:0.015,  label:'$250,000 – $400,000' },
    { min:400000,  max:2000000,  rate:0.020,  label:'$400,000 – $2,000,000' },
    { min:2000000, max:Infinity, rate:0.025,  label:'Over $2,000,000' },
  ];
  const MLTT_RES = [
    { min:0,        max:55000,    rate:0.005,  label:'First $55,000' },
    { min:55000,    max:250000,   rate:0.010,  label:'$55,000 – $250,000' },
    { min:250000,   max:400000,   rate:0.015,  label:'$250,000 – $400,000' },
    { min:400000,   max:2000000,  rate:0.020,  label:'$400,000 – $2,000,000' },
    { min:2000000,  max:3000000,  rate:0.025,  label:'$2M – $3M' },
    { min:3000000,  max:4000000,  rate:0.044,  label:'$3M – $4M' },
    { min:4000000,  max:5000000,  rate:0.0545, label:'$4M – $5M' },
    { min:5000000,  max:10000000, rate:0.065,  label:'$5M – $10M' },
    { min:10000000, max:20000000, rate:0.0755, label:'$10M – $20M' },
    { min:20000000, max:Infinity, rate:0.086,  label:'Over $20M' },
  ];
  const MLTT_OTHER = [
    { min:0,        max:55000,    rate:0.005,  label:'First $55,000' },
    { min:55000,    max:250000,   rate:0.010,  label:'$55,000 – $250,000' },
    { min:250000,   max:400000,   rate:0.015,  label:'$250,000 – $400,000' },
    { min:400000,   max:2000000,  rate:0.020,  label:'$400,000 – $2,000,000' },
    { min:2000000,  max:3000000,  rate:0.025,  label:'$2M – $3M' },
    { min:3000000,  max:4000000,  rate:0.035,  label:'$3M – $4M' },
    { min:4000000,  max:5000000,  rate:0.045,  label:'$4M – $5M' },
    { min:5000000,  max:10000000, rate:0.055,  label:'$5M – $10M' },
    { min:10000000, max:Infinity, rate:0.065,  label:'Over $10M' },
  ];


    function calcTiered(price, brackets) {
    let total = 0; const tiers = [];
    for (const b of brackets) {
      if (price <= b.min) break;
      const taxable = Math.min(price, b.max) - b.min;
      const tax = taxable * b.rate;
      tiers.push({ label:b.label, rate:b.rate, taxable, tax });
      total += tax;
    }
    return { total, tiers };
  }

  function showView(id) {
    document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
    document.getElementById(id).classList.add('active');
  }

  function calculate() {
    const errorEl = document.getElementById('errorMsg');
    errorEl.classList.remove('show');
    const priceRaw = parseFloat(document.getElementById('price').value);
    if (!priceRaw || priceRaw <= 0) {
      errorEl.textContent = 'Please enter a valid purchase price.';
      errorEl.classList.add('show');
      return;
    }
    const price = Math.round(priceRaw);
    const isToronto = document.getElementById('torontoToggle').checked;
    const isFTHB    = document.getElementById('fthbToggle').checked;
    const isResidential = document.querySelector('input[name="propType"]:checked').value === 'residential';

    const prov = calcTiered(price, PROVINCIAL_BRACKETS);
    let mltt = { total:0, tiers:[] };
    if (isToronto) mltt = calcTiered(price, isResidential ? MLTT_RES : MLTT_OTHER);

    let provRebate = 0, mlttRebate = 0;
    if (isFTHB && isResidential) {
      provRebate = Math.min(prov.total, 4000);
      if (isToronto) mlttRebate = Math.min(mltt.total, 4475);
    }
    const netProv  = prov.total  - provRebate;
    const netMLTT  = mltt.total  - mlttRebate;
    const netTotal = netProv + netMLTT;

    // Summary
    document.getElementById('summaryProperty').textContent =
      `${fmt(price)} · ${isToronto?'Toronto':'Ontario'} · ${isResidential?'Residential':'Other'}${isFTHB?' · FTHB':''}`;

    let rows = rowHtml('Provincial LTT', fmt(prov.total));
    if (provRebate > 0) rows += rowHtml('Provincial FTHB Rebate', `–${fmt(provRebate)}`, 'rebate');
    if (isToronto) {
      rows += rowHtml('Toronto MLTT', fmt(mltt.total));
      if (mlttRebate > 0) rows += rowHtml('Toronto MLTT Rebate', `–${fmt(mlttRebate)}`, 'rebate');
    }
    document.getElementById('summaryRows').innerHTML = rows;
    document.getElementById('summaryTotal').textContent = fmt(netTotal);

    // Breakdown
    let bd = '';
    bd += `<div class="breakdown-section-title">Provincial Land Transfer Tax</div>`;
    bd += buildTierTable(prov.tiers);
    bd += `<table class="breakdown-table"><tbody>`;
    if (provRebate > 0) bd += `<tr class="rebate-row"><td colspan="3">FTHB Rebate (max $4,000)</td><td>–${fmt(provRebate)}</td></tr>`;
    bd += `<tr class="subtotal"><td colspan="3">Provincial Net</td><td>${fmt(netProv)}</td></tr>`;
    bd += `</tbody></table>`;

    if (isToronto) {
      bd += `<div class="breakdown-section-title">Toronto MLTT — ${isResidential?'Residential (1–2 units)':'Other'}</div>`;
      bd += buildTierTable(mltt.tiers);
      bd += `<table class="breakdown-table"><tbody>`;
      if (mlttRebate > 0) bd += `<tr class="rebate-row"><td colspan="3">FTHB Rebate (max $4,475)</td><td>–${fmt(mlttRebate)}</td></tr>`;
      bd += `<tr class="subtotal"><td colspan="3">MLTT Net</td><td>${fmt(netMLTT)}</td></tr>`;
      bd += `</tbody></table>`;
    }

    bd += `<table class="breakdown-table" style="margin-top:14px;"><tbody>
      <tr class="grand-total"><td colspan="3">Total Net Land Transfer Tax</td><td>${fmt(netTotal)}</td></tr>
    </tbody></table>`;

    document.getElementById('breakdownContent').innerHTML = bd;
    showView('view-results');
  }

  function showDetails() { showView('view-details'); }

  function resetForm() {
    document.getElementById('price').value = '';
    document.getElementById('torontoToggle').checked = false;
    document.getElementById('fthbToggle').checked = false;
    document.querySelector('input[name="propType"][value="residential"]').checked = true;
    document.getElementById('errorMsg').classList.remove('show');
    showView('view-form');
  }

  function rowHtml(label, amount, cls='') {
    return `<div class="result-row ${cls}"><span class="rr-label">${label}</span><span class="rr-amount">${amount}</span></div>`;
  }
  function buildTierTable(tiers) {
    let h = `<table class="breakdown-table"><thead><tr><th>Bracket</th><th>Rate</th><th>Taxable</th><th>Tax</th></tr></thead><tbody>`;
    for (const t of tiers) h += `<tr class="tier-active"><td>${t.label}</td><td>${pct(t.rate)}</td><td>${fmt(t.taxable)}</td><td>${fmt(t.tax)}</td></tr>`;
    h += `</tbody></table>`;
    return h;
  }

  document.addEventListener('keydown', e => { if (e.key === 'Enter') calculate(); });
</script>

</body>
</html>
